apiVersion: sofe/v1
kind: Policy
metadata:
  name: s3-public-access-not-blocked
  description: S3 buckets without public access block (data exposure risk)
  tags:
  - security
  - storage
spec:
  scope:
    resource_types:
    - aws.s3
  rule:
    metric: public_access_blocked
    operator: ==
    threshold: 0
  message: 'public_access_blocked = {value} (threshold: =={threshold})'
  recommendation: Enable S3 Block Public Access immediately to prevent data leaks
  severity: critical
