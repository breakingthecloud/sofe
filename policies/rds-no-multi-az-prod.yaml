apiVersion: sofe/v1
kind: Policy
metadata:
  name: rds-no-multi-az-prod
  description: "Production RDS instance is not Multi-AZ — single point of failure risk"
  author: sofe
  tags: [reliability, architecture]
spec:
  scope:
    resource_types: ["aws.rds"]
    environments: ["prod", "production"]
  rule:
    metric: multi_az
    operator: "=="
    threshold: 0
  severity: high
  actions:
    - type: finding
      suggestion: "Enable Multi-AZ for production database to ensure high availability"
