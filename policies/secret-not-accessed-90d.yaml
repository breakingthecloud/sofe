apiVersion: sofe/v1
kind: Policy
metadata:
  name: secret-not-accessed-90d
  description: Secrets not accessed in 90+ days (potentially unused)
  tags:
  - cost-optimization
  - security
spec:
  scope:
    resource_types:
    - aws.secretsmanager
  rule:
    metric: days_since_last_access
    operator: '>'
    threshold: 90
  message: 'days_since_last_access = {value} (threshold: >{threshold})'
  recommendation: Review if this secret is still needed. Remove unused secrets to
    reduce cost and attack surface.
  severity: low
