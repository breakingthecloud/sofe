name: SOFE FinOps Policy Check

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SOFE
        run: pip install sofe

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Validate Policies
        run: sofe validate --policies ./policies/

      - name: Evaluate (block on high/critical)
        run: sofe evaluate --policies ./policies/ --fail-on high --format json > findings.json

      - name: Upload findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sofe-findings
          path: findings.json
